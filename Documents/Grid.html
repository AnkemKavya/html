<!DOCTYPE html>
<html>
    <head>
        <title>Grid</title>
        <style>
            .columns{
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
            }
            .rows{
                display: grid;
                grid-template-rows: 2fr 2fr 2fr;
            }
            .gap{
                display: grid;
                
                gap: 50px;
            }
        </style>
    </head>
