<!DOCTYPE html>
<html>
    <head>
        <title>Properties</title>
        <style>
        img{
            float: left;
            margin-right: 50px;
        }
        .laptop{
            padding-top: 20px;
        }
        .clear{
            clear: both;
        }
        </style>
    </head>
    <body>
        <h1>Float left</h1>
        <img width="200px" height="200px" src="https://www.asus.com/media/Odin/Websites/global/Series/9.png">
        <div class="laptop">
        <p>Explanation:</p>
        <p>Moves element to left</p>
        <p>Expected output:</p>
        <p>Text wraps beside image</p>
        </div>
        <hr>

        <h1>Clear both</h1>
        <div class="clear">
        <p>Explanation:</p>
        <p>Stops wrapping.</p>
        <p>Expected output:</p>
        <p>Content moves below floated elements.</p>
        </div>
    </body>
</html>
