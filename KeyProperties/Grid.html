<!DOCTYPE html>
<html>
    <head>
        <title>Grid</title>
        <style>
            .columns{
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 20px;
            }
            .rows{
                display: grid;
                grid-template-rows: 1fr 1fr 1fr;
            }
            .gap{
                display: grid;
                
                gap: 50px;
            }
            .area{
                display: grid;
                grid-area: 1 / 1 / 3 / 3;
            }
            p{
                text-align: center;
            }
        </style>
    </head>
