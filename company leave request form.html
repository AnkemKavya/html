<!DOCTYPE html>
    <html>
    <head>   
        <title>Company leave request form</title>
    </head> 
    <body>
        <h1>Company leave request form</h1>
        <h3>
            <mark>Requested Name</mark>
        </h3><br>
        <form>
        <label>Full Name</label>
            <input><br>
        <label>Employee ID</label>
            <input><br>
        <label>Department</label>
            <input><br>
        <label>Position</label>
            <input>
        <h3>
            <mark>Leave Details</mark>
        </h3>
        <b>
            <lable>Type of Leave</lable>
        </b><br>
                <input type="radio">Vacation Leave
                <input type="radio">Sick Leave
                <input type="radio">Personal Leave
                <input type="radio">Maternity/Paternity Leave
                <input type="radio">Other<br>
            <label>Leave Start Date</label>
                <input type="date">
            <label>Leave End Date</label>
                <input type="date"><br>
            <label>Total Days of Leave</label>
                <input type="number"><br>
            <label>Reason for Leave</label>
                <input>
        <h3>
            <mark>Approval Section</mark>
        </h3>
            <label>Supervisor's Name</label>
                <input>
            <label>Date Signed</label>
                <input type="date">
            <label>Signature</label>
                <input>
        <h3>
            <mark>For HR Use Only</mark>
        </h3>
            <label>Status</label><br>
                <input type="radio">Approved
                <input type="radio">Denied<br>
            <label>HR Representative</label>
                <input>
            <label>Date Signed</label>
                <input type="date"><br>
            <label>Comments</label>
                <input><br>
            <label>Signature</label>
                <input>
        </form>
    </body>
    </html>
