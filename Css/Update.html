<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f8f8;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .header .logo {
      font-size: 24px;
      color: #E60023; /* Pinterest red */
      font-weight: bold;
    }

    .header .search-bar input {
      padding: 8px;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 20px;
    }

    .header .buttons button {
      margin-left: 10px;
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    .login-btn {
      background-color: #E60023;
      color: white;
    }

    .signup-btn {
      background-color: #eee;
    }

    /* Main content */
    .main {
      text-align: center;
      margin-top: 80px;
    }

    .main h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .main p {
      color: #555;
      margin-bottom: 20px;
    }

    .search-box {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .search-box input {
      padding: 10px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 20px 0 0 20px;
    }

    .search-box button {
      padding: 10px 20px;
      border: none;
      background-color: #E60023;
      color: white;
      border-radius: 0 20px 20px 0;
      cursor: pointer;
    }

    /* Chat button */
    .chat-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #E60023;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 12px 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">Pinterest</div>
    <div class="search-bar">
      <input type="text" placeholder="Search for easy dinners, fashion, etc.">
    </div>
    <div class="buttons">
      <button class="login-btn">Log in</button>
      <button class="signup-btn">Sign up</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <h2>Update your login method</h2>
    <p>Facebook login isn’t supported anymore. You’ll need to recover your account.</p>
    <div class="search-box">
      <input type="text" placeholder="Search for your email, name, or username">
      <button>Search</button>
    </div>
  </div>

  <!-- Chat button -->
  <button class="chat-btn">Chat</button>
</body>
</html>
